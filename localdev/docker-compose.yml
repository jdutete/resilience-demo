version: '3.8'
services:
  prometheus-rd:
    image: prom/prometheus:latest
    container_name: prometheus-rd
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana-rd:
    image: grafana/grafana:latest
    container_name: grafana-rd
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus-rd